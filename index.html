<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gestión Ambiental y SST: Desarrollo de Software</title>

  <!-- Tailwind CSS (reemplaza las clases de utilidad) -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- React 18 -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>

  <!-- Babel Standalone (transpila JSX en el navegador) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    /* ── Iconos SVG (reemplazan lucide-react) ── */

    const ShieldCheck = ({ className }) => (
      <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor"
           strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"/>
        <path d="m9 12 2 2 4-4"/>
      </svg>
    );

    const Leaf = ({ className }) => (
      <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor"
           strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10z"/>
        <path d="M2 21c0-3 1.85-5.36 5.08-6C9.5 14.52 12 13 13 12"/>
      </svg>
    );

    const AlertTriangle = ({ className }) => (
      <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor"
           strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3"/>
        <path d="M12 9v4M12 17h.01"/>
      </svg>
    );

    const ClipboardList = ({ className }) => (
      <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor"
           strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <rect width="8" height="4" x="8" y="2" rx="1"/>
        <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/>
        <path d="M12 11h4M12 16h4M8 11h.01M8 16h.01"/>
      </svg>
    );

    const Zap = ({ className }) => (
      <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor"
           strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M4 14a1 1 0 0 1-.78-1.63l9.9-10.2a.5.5 0 0 1 .86.46l-1.92 6.02A1 1 0 0 0 13 10h7a1 1 0 0 1 .78 1.63l-9.9 10.2a.5.5 0 0 1-.86-.46l1.92-6.02A1 1 0 0 0 11 14z"/>
      </svg>
    );

    const Monitor = ({ className }) => (
      <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor"
           strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <rect width="20" height="14" x="2" y="3" rx="2"/>
        <path d="M8 21h8M12 17v4"/>
      </svg>
    );

    const Trash2 = ({ className }) => (
      <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor"
           strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M3 6h18"/>
        <path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/>
        <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/>
        <line x1="10" x2="10" y1="11" y2="17"/>
        <line x1="14" x2="14" y1="11" y2="17"/>
      </svg>
    );

    const MousePointer = ({ className }) => (
      <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor"
           strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M4.037 4.688a.495.495 0 0 1 .651-.651l16 6.5a.5.5 0 0 1-.063.947l-6.124 1.58a2 2 0 0 0-1.438 1.435l-1.579 6.126a.5.5 0 0 1-.947.063z"/>
      </svg>
    );

    const Brain = ({ className }) => (
      <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor"
           strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">

    const Target = ({ className }) => (
      <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor"

      </svg>
    );

    const FileCode = ({ className }) => (
      <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor"
           strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/>
        <path d="M14 2v4a2 2 0 0 0 2 2h4"/>
        <path d="m10 13-2 2 2 2"/>
        <path d="m14 17 2-2-2-2"/>
      </svg>
    );

    const Server = ({ className }) => (
      <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor"
           strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <rect width="20" height="8" x="2" y="2" rx="2"/>
        <rect width="20" height="8" x="2" y="14" rx="2"/>
        <path d="M6 6h.01M6 18h.01"/>
      </svg>
    );

    const Cpu = ({ className }) => (
      <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor"
           strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <rect x="4" y="4" width="16" height="16" rx="2"/>
        <rect x="9" y="9" width="6" height="6"/>
        <path d="M15 2v2M15 20v2M2 15h2M20 15h2M9 2v2M9 20v2M2 9h2M20 9h2"/>

    /* ── Componente principal (código React original sin cambios) ── */

    const MindMap = () => {
      const [activeTab, setActiveTab] = useState('all');

      const SubNode = ({ title, icon: Icon, color, detail }) => (
        <div className={`flex flex-col p-2 rounded-lg border bg-white shadow-sm hover:scale-105 transition-transform mb-2 w-full max-w-[240px] ${color}`}>
          <div className="flex items-center">
            <Icon className="w-4 h-4 mr-2 flex-shrink-0" />
            <span className="text-xs font-bold text-gray-800 leading-tight">{title}</span>
          </div>
          {detail && <span className="text-[10px] text-gray-500 mt-1 ml-6">{detail}</span>}
        </div>
      );

      return (
        <div className="min-h-screen bg-slate-50 p-4 md:p-10 font-sans text-gray-800">
          <div className="max-w-7xl mx-auto">

            {/* Header */}
            <div className="text-center mb-12">
              <h1 className="text-3xl font-black text-slate-800 mb-2 uppercase tracking-tight">
                Gestión Ambiental y SST: Desarrollo de Software
              </h1>
              <p className="text-slate-500 font-medium">Plan de Acción - Evidencia GA8-220601501-AA3-EV01</p>
              <div className="h-1 w-24 bg-indigo-500 mx-auto mt-4 rounded-full"></div>
            </div>

            <div className="relative flex flex-col items-center">

              <div className="flex flex-col md:flex-row items-center md:items-start justify-center w-full gap-0 md:gap-8">

                {/* RAMA IZQUIERDA: SST */}

                  <div className="bg-blue-600 text-white p-4 rounded-xl shadow-lg mb-4 w-64 text-center md:text-right flex flex-row-reverse md:flex-row items-center justify-between">
                    <span className="font-bold text-lg">SST en el Dev</span>
                    <ShieldCheck className="w-6 h-6 ml-2 md:mr-2" />
                  </div>

                  <div className="flex flex-col items-center md:items-end space-y-2 w-full">
                    <SubNode
                      title="Ergonomía de Oficina"
                      icon={Monitor}
                      color="border-blue-200"
                      detail="Sillas ergonómicas, altura de monitor y teclados."
                    />
                    <SubNode
                      title="Salud Mental y Estrés"
                      icon={Brain}
                      color="border-blue-200"
                      detail="Gestión del Burnout y presión por plazos (Sprints)."
                    />
                    <SubNode
                      title="Salud Visual"
                      icon={Target}
                      color="border-blue-200"
                      detail="Filtros de luz azul y pausas para descanso ocular."
                    />
                    <SubNode
                      title="Pausas Activas"
                      icon={ShieldCheck}
                      color="border-blue-200"
                      detail="Prevención de Túnel Carpiano y fatiga lumbar."
                    />
                  </div>
                </div>

                {/* NODO CENTRAL */}
                <div className="flex flex-col items-center justify-center w-full md:w-1/4 order-1 md:order-2 mb-10 md:mb-0">
                  <div className="relative">
                    <div className="absolute inset-0 bg-indigo-100 rounded-full scale-150 blur-3xl opacity-50"></div>
                    <div className="relative bg-white border-4 border-indigo-600 p-6 rounded-full shadow-2xl flex flex-col items-center justify-center text-center z-10 w-48 h-48 md:w-60 md:h-60">
                      <Cpu className="w-10 h-10 text-indigo-600 mb-2" />
                      <span className="text-sm font-black text-indigo-900 leading-tight">IMPACTO DEL<br/>DESARROLLADOR</span>
                      <span className="text-[10px] text-indigo-500 mt-2 font-bold uppercase">Recursos &amp; Bienestar</span>
                    </div>
                  </div>
                  <div className="hidden md:block h-12 border-l-2 border-dashed border-gray-400 mt-4"></div>
                </div>

                {/* RAMA DERECHA: RECURSOS NATURALES */}
                <div className="flex flex-col items-center md:items-start w-full md:w-1/3 order-3">
                  <div className="bg-green-600 text-white p-4 rounded-xl shadow-lg mb-4 w-64 text-center md:text-left flex items-center justify-between">
                    <Leaf className="w-6 h-6 mr-2" />
                    <span className="font-bold text-lg">Recursos Naturales</span>
                  </div>

                  <div className="flex flex-col items-center md:items-start space-y-2 w-full">
                    <SubNode
                      title="Energía de Hardware"
                      icon={Zap}
                      color="border-green-200"
                      detail="Consumo de estaciones de trabajo y servidores locales."
                    />
                    <SubNode
                      title="Huella de Carbono Digital"
                      icon={Server}
                      color="border-green-200"
                      detail="Impacto del almacenamiento en la nube y CI/CD."
                    />
                    <SubNode
                      title="Residuos Electrónicos"
                      icon={Trash2}
                      color="border-green-200"
                      detail="Disposición de laptops, teclados y monitores (RAEE)."
                    />
                    <SubNode
                      title="Eficiencia de Software"
                      icon={FileCode}
                      color="border-green-200"
                      detail="Green Coding: optimización de código para usar menos CPU."
                    />
                  </div>
                </div>

              </div>

              {/* RAMA INFERIOR: ACCIONES PREVENTIVAS */}
              <div className="mt-8 flex flex-col items-center w-full max-w-2xl">
                <div className="bg-orange-500 text-white p-3 rounded-xl shadow-md mb-4 w-60 text-center flex items-center justify-center gap-2">
                  <ClipboardList className="w-5 h-5" />
                  <span className="font-bold text-sm uppercase">Acciones Preventivas</span>
                </div>

                <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-3 w-full px-4">
                  <div className="flex flex-col items-center p-3 bg-white border border-orange-100 rounded-lg shadow-sm">
                    <span className="text-orange-600 font-bold text-[10px] mb-1">TELETRABAJO</span>
                    <span className="text-[9px] text-center text-gray-600 leading-tight">Reducción de emisiones por desplazamientos.</span>
                  </div>
                  <div className="flex flex-col items-center p-3 bg-white border border-orange-100 rounded-lg shadow-sm">
                    <span className="text-orange-600 font-bold text-[10px] mb-1">HARDWARE ECO</span>
                    <span className="text-[9px] text-center text-gray-600 leading-tight">Uso de componentes certificados Energy Star.</span>
                  </div>
                  <div className="flex flex-col items-center p-3 bg-white border border-orange-100 rounded-lg shadow-sm">
                    <span className="text-orange-600 font-bold text-[10px] mb-1">ALGORITMOS</span>
                    <span className="text-[9px] text-center text-gray-600 leading-tight">Optimización para menor consumo energético.</span>
                  </div>
                  <div className="flex flex-col items-center p-3 bg-white border border-orange-100 rounded-lg shadow-sm">
                    <span className="text-orange-600 font-bold text-[10px] mb-1">BIOFILIA</span>
                    <span className="text-[9px] text-center text-gray-600 leading-tight">Entornos con luz natural y plantas para SST.</span>
                  </div>
                </div>
              </div>

            </div>

            {/* Footer Informativo */}
            <div className="mt-16 grid grid-cols-1 md:grid-cols-2 gap-6">
              <div className="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm flex items-start gap-4">
                <div className="bg-indigo-100 p-3 rounded-lg text-indigo-600">
                  <MousePointer className="w-6 h-6" />
                </div>
                <div>
                  <h3 className="font-bold text-slate-800">Sostenibilidad Digital</h3>
                  <p className="text-xs text-slate-600 leading-relaxed mt-1">
                    El gasto de recursos no es solo físico; el código ineficiente consume más energía en servidores. La acción ambiental del desarrollador radica en la optimización de procesos.
                  </p>
                </div>
              </div>
              <div className="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm flex items-start gap-4">
                <div className="bg-orange-100 p-3 rounded-lg text-orange-600">
                  <AlertTriangle className="w-6 h-6" />
                </div>
                <div>
                  <h3 className="font-bold text-slate-800">Riesgos Biomecánicos</h3>
                  <p className="text-xs text-slate-600 leading-relaxed mt-1">
                    El sedentarismo es el principal riesgo en IT. Las acciones de SST deben enfocarse en estaciones de trabajo dinámicas y bienestar mental preventivo.
                  </p>
                </div>
              </div>
            </div>

          </div>
        </div>
      );
    };

    /* ── Montar la app ── */
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<MindMap />);
  </script>
</body>
</html>
